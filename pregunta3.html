    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Simulador de Evacuación de Emergencia</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #1a1a1a, #2c1e0f);
                color: #fff;
                margin: 0;
                padding: 20px;
                display: flex;
                justify-content: center;
                min-height: 100vh;
            }
            .panel {
                background: #1f1f1f;
                padding: 25px;
                border-radius: 16px;
                box-shadow: 0 12px 40px rgba(0,0,0,0.7);
                width: 100%;
                max-width: 1100px;
                border: 1px solid #ff9800;
            }
            h2 {
                color: #ff9800;
                text-align: center;
                margin-top: 0;
                font-size: 1.9em;
                text-shadow: 0 0 10px rgba(255, 152, 0, 0.4);
            }

            .controls {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                gap: 18px;
                background: #2a2a2a;
                padding: 20px;
                border-radius: 12px;
                margin-bottom: 20px;
                border: 1px solid #444;
            }
            .control-group label {
                display: block;
                margin-bottom: 8px;
                color: #ddd;
                font-size: 0.95em;
            }
            input[type="range"] {
                accent-color: #ff9800;
            }
            .val-display {
                float: right;
                font-weight: bold;
                color: #ffd54f;
            }

            .buttons {
                display: flex;
                gap: 12px;
                margin-bottom: 20px;
            }
            button {
                flex: 1;
                padding: 14px;
                border: none;
                border-radius: 10px;
                font-weight: bold;
                cursor: pointer;
                font-size: 1.1em;
                transition: all 0.3s;
            }
            .btn-start {
                background: linear-gradient(90deg, #ff9800, #f57c00);
                color: #000;
            }
            .btn-start:hover { background: linear-gradient(90deg, #f57c00, #ff9800); transform: translateY(-2px); }

            .btn-pause {
                background: #455a64;
                color: white;
            }
            .btn-pause:hover { background: #546e7a; }

            .stats-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                margin-bottom: 20px;
            }
            .stat-card {
                background: #2a2a2a;
                padding: 14px;
                border-radius: 10px;
                text-align: center;
                border: 1px solid #555;
            }
            .stat-label { font-size: 0.85em; color: #aaa; }
            .stat-value {
                font-size: 1.8em;
                font-weight: bold;
                font-family: monospace;
            }

            .simulation-area {
                display: grid;
                grid-template-columns: 1fr 380px;
                gap: 20px;
                margin-bottom: 20px;
            }

            .canvas-container {
                background: #111;
                padding: 10px;
                border-radius: 12px;
                border: 2px solid #555;
            }
            canvas {
                width: 100%;
                height: 420px;
                border-radius: 8px;
                image-rendering: crisp-edges;
            }

            .chart-container {
                background: #111;
                padding: 15px;
                border-radius: 12px;
                border: 1px solid #555;
                height: 420px;
            }

            .terminal {
                background: #0a0a0a;
                border: 1px solid #444;
                border-radius: 10px;
                padding: 12px;
                height: 180px;
                overflow-y: auto;
                font-family: 'Courier New', monospace;
                font-size: 0.85em;
                color: #00ff9d;
            }
            .terminal p { margin: 3px 0; }
            .log-time { color: #888; }
        </style>
    </head>
    <body>
        <div class="panel">
            <h2>🔥 SIMULADOR DE EVACUACIÓN DE EMERGENCIA</h2>

            <div class="controls">
                <div class="control-group">
                    <label>Población Total <span id="valPob" class="val-display">150</span></label>
                    <input type="range" id="inPob" min="50" max="500" step="10" value="150">
                </div>
                <div class="control-group">
                    <label>Capacidad de la Puerta (Ancho) <span id="valPuerta" class="val-display">Media</span></label>
                    <input type="range" id="inPuerta" min="20" max="120" step="10" value="60">
                </div>
                <div class="control-group">
                    <label>Velocidad de Pánico <span id="valVel" class="val-display">Normal</span></label>
                    <input type="range" id="inVel" min="1" max="4" step="0.5" value="2.5">
                </div>
                <div class="control-group" style="grid-column: span 2;">
                    <label style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="chkObs" checked> Incluir Obstáculos Centrales (Mesas y Muros)
                    </label>
                </div>
            </div>

            <div class="buttons">
                <button class="btn-start" onclick="simuladorEvac.iniciar()">🚨 INICIAR EVACUACIÓN</button>
                <button class="btn-pause" id="btnPause" onclick="simuladorEvac.pausar()">⏸ PAUSAR</button>
                <button onclick="simuladorEvac.reiniciar()">REINICIAR</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Tiempo Transcurrido</div>
                    <div id="statTiempo" class="stat-value" style="color:#ff9800;">0.0 s</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Evacuados a Salvo</div>
                    <div id="statEvac" class="stat-value" style="color:#4caf50;">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">En el Recinto</div>
                    <div id="statDentro" class="stat-value" style="color:#ff5722;">150</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Tasa de Evacuación</div>
                    <div id="statTasa" class="stat-value" style="color:#00bcd4;">0 pers/s</div>
                </div>
            </div>

            <div class="simulation-area">
                <!-- Plano de simulación -->
                <div class="canvas-container">
                    <canvas id="plano" width="760" height="420"></canvas>
                </div>

                <!-- Gráfico de progreso -->
                <div class="chart-container">
                    <canvas id="graficoEvac"></canvas>
                </div>
            </div>

            <!-- Terminal de Logs -->
            <div class="terminal" id="terminal">
                <p><span class="log-time">[00:00]</span> Sistema de simulación de evacuación inicializado.</p>
            </div>
        </div>

        <script>
            let chart;
            const simuladorEvac = {
                agentes: [],
                obstaculos: [],
                puerta: { x: 650, y: 210, ancho: 60 },
                tiempo: 0,
                evacuados: 0,
                frame: 0,
                corriendo: false,
                paused: false,
                historialEvac: [],

                log: function(msg) {
                    const terminal = document.getElementById('terminal');
                    const p = document.createElement('p');
                    const time = (this.tiempo).toFixed(1);
                    p.innerHTML = `<span class="log-time">[${time}s]</span> ${msg}`;
                    terminal.appendChild(p);
                    terminal.scrollTop = terminal.scrollHeight;
                },

                iniciar: function() {
                    if (this.corriendo) return;
                    
                    this.reiniciarValores();
                    this.corriendo = true;
                    this.paused = false;
                    document.getElementById('btnPause').innerText = "⏸ PAUSAR";

                    const pobTotal = parseInt(document.getElementById('inPob').value);
                    this.puerta.ancho = parseInt(document.getElementById('inPuerta').value);
                    const velocidadBase = parseFloat(document.getElementById('inVel').value);
                    const usarObstaculos = document.getElementById('chkObs').checked;

                    this.canvas = document.getElementById('plano');
                    this.ctx = this.canvas.getContext('2d');

                    this.agentes = [];
                    this.obstaculos = [];
                    this.historialEvac = [];

                    // Crear obstáculos
                    if (usarObstaculos) {
                        this.obstaculos = [
                            {x: 180, y: 140, w: 120, h: 50},
                            {x: 420, y: 180, w: 110, h: 45},
                            {x: 280, y: 280, w: 90, h: 55}
                        ];
                    }

                    // Crear agentes (personas)
                    for (let i = 0; i < pobTotal; i++) {
                        this.agentes.push({
                            x: Math.random() * 500 + 30,
                            y: Math.random() * 360 + 30,
                            velocidad: velocidadBase + Math.random() * 1.2,
                            radio: 5.5,
                            aSalvo: false,
                            color: "#f44336"
                        });
                    }

                    this.log(`Iniciando evacuación de <strong>${pobTotal}</strong> personas...`);
                    this.initChart();
                    this.loop();
                },

                pausar: function() {
                    this.paused = !this.paused;
                    document.getElementById('btnPause').innerText = this.paused ? "▶ REANUDAR" : "⏸ PAUSAR";
                    this.log(this.paused ? "Simulación pausada." : "Simulación reanudada.");
                },

                reiniciar: function() {
                    this.corriendo = false;
                    if (chart) chart.destroy();
                    document.getElementById('terminal').innerHTML = '<p><span class="log-time">[00:00]</span> Sistema reiniciado.</p>';
                    document.getElementById('btnPause').innerText = "⏸ PAUSAR";
                },

                reiniciarValores: function() {
                    this.tiempo = 0;
                    this.evacuados = 0;
                    this.frame = 0;
                },

                initChart: function() {
                    const ctx = document.getElementById('graficoEvac');
                    if (chart) chart.destroy();

                    chart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: [],
                            datasets: [{
                                label: 'Personas Evacuadas',
                                data: [],
                                borderColor: '#4caf50',
                                backgroundColor: 'rgba(76, 175, 80, 0.2)',
                                tension: 0.3,
                                borderWidth: 3,
                                pointRadius: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                x: { title: { display: true, text: 'Tiempo (segundos)', color: '#aaa' }, grid: { color: '#333' }, ticks: { color: '#aaa' } },
                                y: { title: { display: true, text: 'Evacuados', color: '#aaa' }, grid: { color: '#333' }, ticks: { color: '#aaa' } }
                            },
                            plugins: {
                                legend: { display: true, labels: { color: '#ddd' } }
                            }
                        }
                    });
                },

                loop: function() {
                    if (!this.corriendo || this.paused) {
                        requestAnimationFrame(() => this.loop());
                        return;
                    }

                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    this.dibujarEntorno();
                    this.actualizarAgentes();

                    this.tiempo += 0.016; // ~60 FPS
                    this.frame++;

                    // Actualizar interfaz
                    document.getElementById('statTiempo').innerText = this.tiempo.toFixed(1) + " s";
                    document.getElementById('statEvac').innerText = this.evacuados;
                    document.getElementById('statDentro').innerText = this.agentes.length - this.evacuados;
                    document.getElementById('statTasa').innerText = (this.evacuados / Math.max(this.tiempo, 0.1)).toFixed(1) + " pers/s";

                    // Actualizar gráfico cada 8 frames
                    if (this.frame % 8 === 0) {
                        this.historialEvac.push(this.evacuados);
                        if (chart) {
                            chart.data.labels = this.historialEvac.map((_, i) => (i * 0.13).toFixed(1));
                            chart.data.datasets[0].data = this.historialEvac;
                            chart.update('none');
                        }
                    }

                    if (this.evacuados < this.agentes.length) {
                        this.animacion = requestAnimationFrame(() => this.loop());
                    } else {
                        this.corriendo = false;
                        this.log(`¡EVACUACIÓN COMPLETADA EN ${this.tiempo.toFixed(1)} segundos!`);
                        this.mostrarMensajeFinal();
                    }
                },

                actualizarAgentes: function() {
                    let agentesEnPuerta = 0;
                    const capacidadPorFrame = Math.max(1, Math.floor(this.puerta.ancho / 18));

                    for (let p of this.agentes) {
                        if (p.aSalvo) continue;

                        const dx = this.puerta.x - p.x;
                        const dy = this.puerta.y - p.y;
                        const distancia = Math.sqrt(dx*dx + dy*dy) || 1;

                        // Llegó a la salida
                        if (distancia < 25 && Math.abs(dx) < this.puerta.ancho / 2) {
                            if (agentesEnPuerta < capacidadPorFrame) {
                                p.aSalvo = true;
                                this.evacuados++;
                                agentesEnPuerta++;
                                p.x = -100; // Sacar del plano visualmente
                            }
                            continue;
                        }

                        // Movimiento hacia la puerta
                        let moveX = (dx / distancia) * p.velocidad;
                        let moveY = (dy / distancia) * p.velocidad;

                        // Evasión mejorada de obstáculos
                        for (let obs of this.obstaculos) {
                            if (this.colisionConObstaculo(p, moveX, moveY, obs)) {
                                moveX *= -0.6;
                                moveY *= -0.8;
                            }
                        }

                        p.x += moveX;
                        p.y += moveY;

                        // Color según proximidad a salida
                        p.color = distancia < 80 ? "#ffeb3b" : "#f44336";

                        // Dibujar persona
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.radio, 0, Math.PI * 2);
                        this.ctx.fillStyle = p.color;
                        this.ctx.fill();
                        this.ctx.strokeStyle = "#000";
                        this.ctx.lineWidth = 1.5;
                        this.ctx.stroke();
                    }
                },

                colisionConObstaculo: function(p, moveX, moveY, obs) {
                    const nextX = p.x + moveX;
                    const nextY = p.y + moveY;
                    return (
                        nextX + p.radio > obs.x && 
                        nextX - p.radio < obs.x + obs.w &&
                        nextY + p.radio > obs.y && 
                        nextY - p.radio < obs.y + obs.h
                    );
                },

                dibujarEntorno: function() {
                    // Fondo del recinto
                    this.ctx.fillStyle = "#263238";
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                    // Paredes
                    this.ctx.strokeStyle = "#455a64";
                    this.ctx.lineWidth = 12;
                    this.ctx.strokeRect(20, 20, this.canvas.width - 40, this.canvas.height - 40);

                    // Puerta de salida
                    this.ctx.fillStyle = "#4caf50";
                    this.ctx.fillRect(this.puerta.x - this.puerta.ancho/2, this.puerta.y - 15, this.puerta.ancho, 35);
                    this.ctx.fillStyle = "#1b5e20";
                    this.ctx.font = "bold 14px Arial";
                    this.ctx.textAlign = "center";
                    this.ctx.fillText("SALIDA DE EMERGENCIA", this.puerta.x, this.puerta.y + 28);

                    // Obstáculos
                    this.ctx.fillStyle = "#607d8b";
                    for (let obs of this.obstaculos) {
                        this.ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                        this.ctx.strokeStyle = "#37474f";
                        this.ctx.lineWidth = 3;
                        this.ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
                    }
                },

                mostrarMensajeFinal: function() {
                    this.ctx.fillStyle = "rgba(0,0,0,0.75)";
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.ctx.fillStyle = "#4caf50";
                    this.ctx.font = "bold 32px Arial";
                    this.ctx.textAlign = "center";
                    this.ctx.fillText(`¡EVACUACIÓN EXITOSA!`, this.canvas.width/2, this.canvas.height/2 - 20);
                    this.ctx.font = "22px Arial";
                    this.ctx.fillText(`Tiempo total: ${this.tiempo.toFixed(1)} segundos`, this.canvas.width/2, this.canvas.height/2 + 30);
                }
            };

            // Actualizar valores en tiempo real
            document.getElementById('inPob').addEventListener('input', function() {
                document.getElementById('valPob').innerText = this.value;
            });
            document.getElementById('inPuerta').addEventListener('input', function() {
                let val = parseInt(this.value);
                let texto = val < 40 ? "Estrecha" : (val > 80 ? "Muy Ancha" : "Media");
                document.getElementById('valPuerta').innerText = texto;
            });
            document.getElementById('inVel').addEventListener('input', function() {
                let val = parseFloat(this.value);
                let texto = val < 2 ? "Baja" : (val > 3.5 ? "Alta" : "Normal");
                document.getElementById('valVel').innerText = texto;
            });
        </script>
    </body>
    </html>
